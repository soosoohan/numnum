<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 20px; background: #ddd; display:flex; justify-content:center; }
</style>
</head>
<body>
<svg width="930" height="300" viewBox="0 0 930 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF4E0"/>
      <stop offset="100%" stop-color="#FFE3C2"/>
    </linearGradient>
  </defs>
  <rect width="930" height="300" fill="url(#bg)"/>

  <!-- 왼쪽: 내 고양이 이미지 -->
  <image href="numnum1.png" x="20" y="50" width="180" height="200" preserveAspectRatio="xMidYMid meet"/>

  <!-- 가운데 타이틀 -->
  <g transform="translate(465,150)" text-anchor="middle">
    <text y="-20" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#E8703A">NUMNUM</text>
    <text y="20" font-family="sans-serif" font-size="20" fill="#7A4B2A">A tasty number puzzle</text>
  </g>

  <!-- 오른쪽: 고양이 한번 더, 또는 게임 화면 -->
  <image href="cat.png" x="730" y="50" width="180" height="200" preserveAspectRatio="xMidYMid meet"/>

</svg>
</body>
</html>
