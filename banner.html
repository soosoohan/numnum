<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 20px; background: #ddd; display:flex; justify-content:center; }
</style>
</head>
<body>
<svg width="930" height="300" viewBox="0 0 930 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#FFFFFF"/>
  <stop offset="100%" stop-color="#FFFFFF"/>
</linearGradient>
    <linearGradient id="fruitText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#B8E986"/>  <!-- 2 -->
      <stop offset="25%"  stop-color="#7ED957"/>  <!-- 4 -->
      <stop offset="50%"  stop-color="#4DD0E1"/>  <!-- 8 -->
      <stop offset="75%"  stop-color="#42A5F5"/>  <!-- 16 -->
      <stop offset="100%" stop-color="#7E57C2"/>  <!-- 32 -->
    </linearGradient>
  </defs>

  <rect width="930" height="300" fill="url(#bg)"/>

  <!-- 왼쪽: 고양이 -->
  <image href="https://soosooland.com/numnum/numnum1.png" x="70" y="30" width="240" height="240" 
         preserveAspectRatio="xMidYMid meet"/>

  <!-- 가운데: 타이틀 -->
  <g transform="translate(580,160)" text-anchor="middle">
    <text y="-20" font-family="'Arial Rounded MT Bold', sans-serif" font-size="80" font-weight="600" fill="url(#fruitText)">NumNum</text>
    <text y="20" font-family="sans-serif" font-size="30" fill="url(#fruitText)">A tasty number puzzle</text>
  </g>

</svg>
</body>
</html>
