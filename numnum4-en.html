<script>
const ROWS = 4, COLS = 4;
const ROCK_VALUES_POOL = [32, 64, 128];
const NUM_ROCKS = 3;
const QUEUE_SIZE = 3;
const CARDS = [2, 4];
const CARD_WEIGHTS = [50, 50];

const COLOR_MAP = {
2:       { bg: '#B8E986', fg: '#2F4F1F' },
4:       { bg: '#7ED957', fg: '#FFFFFF' },
8:       { bg: '#4DD0E1', fg: '#FFFFFF' },
16:      { bg: '#42A5F5', fg: '#FFFFFF' },
32:      { bg: '#7E57C2', fg: '#FFFFFF' },
64:      { bg: '#EC407A', fg: '#FFFFFF' },
128:     { bg: '#FFA726', fg: '#FFFFFF' },
256:     { bg: '#FF7043', fg: '#FFFFFF' },
512:     { bg: '#E53935', fg: '#FFFFFF' },
1024:    { bg: '#B0BEC5', fg: '#263238' },
2048:    { bg: '#FFF8E1', fg: '#F57C00' },
4096:    { bg: '#FFE082', fg: '#8D6E00' },
8192:    { bg: '#FFD54F', fg: '#6D4C00' },
16384:   { bg: '#F8BBD0', fg: '#880E4F' },
32768:   { bg: '#CE93D8', fg: '#4A148C' },
65536:   { bg: '#90CAF9', fg: '#0D47A1' },
131072:  { bg: '#80CBC4', fg: '#004D40' },
262144:  { bg: '#C5E1A5', fg: '#33691E' },
524288:  { bg: '#FFF176', fg: '#5D4037' },
};

function getColor(val) {
  return COLOR_MAP[val] || { bg: '#f0c040', fg: '#1a1a2e' };
}

let board, queue, selectedCol, score, gameOver, isMobile;

function init() {
  const uid = localStorage.getItem('numstone_uid') || 'loading...';
  document.getElementById('player-id').textContent = uid;
  score = 0;
  gameOver = false;
  selectedCol = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('save-score-btn').disabled = false;
  document.getElementById('save-score-btn').textContent = '💾 점수 저장';

  board = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => ({ value: 0, isRock: false, hidden: false }))
  );

  const rockPool = shuffleArray([...ROCK_VALUES_POOL]);
  shuffleArray([1, 2, 3]).forEach((r, i) => {
    const c = Math.floor(Math.random() * COLS);
    board[r][c] = { value: rockPool[i], isRock: true, hidden: true };
  });

  queue = Array.from({ length: QUEUE_SIZE + 10 }, randomCard);

  isMobile = window.innerWidth <= 680 || 'ontouchstart' in window;
  document.getElementById('drop-btn').style.display = isMobile ? 'block' : 'none';
  document.getElementById('pc-hint').style.display  = isMobile ? 'none'  : 'block';

  buildGrid();
  buildColButtons();
  updateQueueUI();
  renderBoard();
  highlightCol();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomCard() {
  const total = CARD_WEIGHTS.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < CARDS.length; i++) {
    r -= CARD_WEIGHTS[i];
    if (r <= 0) return CARDS[i];
  }
  return CARDS[0];
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      grid.appendChild(cell);
    }
  }
}

function buildColButtons() {
  const container = document.getElementById('col-buttons');
  container.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const btn = document.createElement('button');
    btn.className = 'col-btn' + (c === selectedCol ? ' selected' : '');
    btn.textContent = '▼';
    btn.addEventListener('click', () => {
      selectedCol = c;
      highlightCol();
      if (isMobile) return;
      dropCard();
    });
    container.appendChild(btn);
  }
}

function highlightCol() {
  document.querySelectorAll('.col-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === selectedCol);
  });
}

function renderBoard(mergeSet, revealSet) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.getElementById(`cell-${r}-${c}`);
      const d = board[r][c];

      el.classList.remove('merge-anim', 'reveal-anim');
      void el.offsetWidth;

      if (mergeSet && mergeSet.has(`${r}-${c}`)) el.classList.add('merge-anim');
      if (revealSet && revealSet.has(`${r}-${c}`)) el.classList.add('reveal-anim');

      if (d.isRock && d.hidden) {
        el.style.background = '#2d2d2d';
        el.style.color = '#555';
        el.style.border = '3px solid #444';
        el.textContent = '🪨';
        el.style.fontSize = '1.6rem';
      } else if (d.isRock && !d.hidden) {
        el.style.background = '#4a4a4a';
        el.style.color = '#f0c040';
        el.style.border = '3px solid #888';
        el.textContent = d.value;
        el.style.fontSize = fontSize(d.value);
      } else if (d.value > 0) {
        const col = getColor(d.value);
        el.style.background = col.bg;
        el.style.color = col.fg;
        el.style.border = 'none';
        el.textContent = d.value;
        el.style.fontSize = fontSize(d.value);
      } else {
        el.style.background = '#222';
        el.style.color = '#555';
        el.style.border = 'none';
        el.textContent = '';
        el.style.fontSize = '1.2rem';
      }
    }
  }
}

function fontSize(v) {
  if (v >= 1000) return '0.9rem';
  if (v >= 100)  return '1.05rem';
  return '1.2rem';
}

function updateQueueUI() {
  for (let i = 0; i < QUEUE_SIZE; i++) {
    const el = document.getElementById(`q${i}`);
    if (!el) continue;
    const val = queue[i];
    el.textContent = val ?? '';
    el.style.background = i === 0 ? '#555' : '#333';
    el.style.color      = i === 0 ? '#eee' : '#777';
    el.className = 'queue-card' + (i === 0 ? ' active' : '');
  }
}

function dropCard() {
  if (gameOver) return;

  const col = selectedCol;
  const cardVal = queue[0];

  let targetRow = -1;
  for (let r = 0; r < ROWS; r++) {
    const cell = board[r][col];
    if (cell.isRock || cell.value > 0) {
      if (r > 0 && board[r-1][col].value === 0 && !board[r-1][col].isRock) {
        targetRow = r - 1;
      }
      break;
    }
    if (r === ROWS - 1) targetRow = r;
  }

  if (targetRow === -1) {
    checkGameOver();
    return;
  }

  board[targetRow][col] = { value: cardVal, isRock: false, hidden: false };
  queue.shift();
  queue.push(randomCard());
  updateQueueUI();

  const mergeSet  = new Set();
  const revealSet = new Set();
  runMergeLoop(targetRow, col, mergeSet, revealSet);

  renderBoard(mergeSet, revealSet);
  checkGameOver();
}

function runMergeLoop(newR, newC, mergeSet, revealSet) {
  let q = [{ r: newR, c: newC }];

  while (q.length > 0) {
    const next = [];
    for (const { r, c } of q) {
      if (board[r][c].value === 0) continue;
      const val = board[r][c].value;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
        const nb = board[nr][nc];

        if (nb.isRock) {
          if (nb.hidden && nb.value === val * 2) {
            board[nr][nc].hidden = false;
            revealSet.add(`${nr}-${nc}`);
          } else if (!nb.hidden && nb.value === val) {
            score += val * 2;
            document.getElementById('score').textContent = score;
            board[nr][nc] = { value: val * 2, isRock: false, hidden: false };
            board[r][c]   = { value: 0, isRock: false, hidden: false };
            mergeSet.add(`${nr}-${nc}`);
            next.push({ r: nr, c: nc });
          }
          continue;
        }

        if (nb.value === val) {
          const newVal = val * 2;
          score += newVal;
          document.getElementById('score').textContent = score;
          board[nr][nc] = { value: newVal, isRock: false, hidden: false };
          board[r][c]   = { value: 0, isRock: false, hidden: false };
          mergeSet.add(`${nr}-${nc}`);
          next.push({ r: nr, c: nc });
          if (newVal === 256) fireConfetti();
          break;
        }
      }
    }

    applyGravityAll();

    if (next.length === 0) {
      const seen = new Set();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cur = board[r][c];
          if (cur.value === 0 || cur.isRock) continue;

          const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
          for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
            const nb = board[nr][nc];

            if (!nb.isRock && nb.value === cur.value) {
              const key = `${r}-${c}`;
              if (!seen.has(key)) {
                next.push({ r, c });
                seen.add(key);
                seen.add(`${nr}-${nc}`);
              }
              break;
            }

            if (nb.isRock && !nb.hidden && nb.value === cur.value) {
              const key = `${r}-${c}`;
              if (!seen.has(key)) {
                next.push({ r, c });
                seen.add(key);
              }
              break;
            }
          }
        }
      }
    }

    q = next;
  }
}

function applyGravityAll() {
  for (let c = 0; c < COLS; c++) {
    getColumnSegments(c).forEach(seg => compactDown(c, seg));
  }
}

function getColumnSegments(c) {
  const segments = [];
  let start = 0;
  for (let r = 0; r < ROWS; r++) {
    if (board[r][c].isRock) {
      if (r > start) segments.push({ from: start, to: r - 1 });
      start = r + 1;
    }
  }
  if (start < ROWS) segments.push({ from: start, to: ROWS - 1 });
  return segments;
}

function compactDown(c, { from, to }) {
  let writeRow = to;
  for (let r = to; r >= from; r--) {
    if (board[r][c].value > 0 && !board[r][c].isRock) {
      if (r !== writeRow) {
        board[writeRow][c] = { ...board[r][c] };
        board[r][c] = { value: 0, isRock: false, hidden: false };
      }
      writeRow--;
    }
  }
  for (let r = writeRow; r >= from; r--) {
    board[r][c] = { value: 0, isRock: false, hidden: false };
  }
}

async function checkGameOver() {
  for (let c = 0; c < COLS; c++) {
    const cell = board[0][c];
    if (!cell.isRock && cell.value === 0) return;
  }
  gameOver = true;

  const myUid = window.getOrCreateUserId();
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('my-id-badge').textContent = `ID: ${myUid}`;
  document.getElementById('save-score-btn').disabled = false;
  document.getElementById('save-score-btn').textContent = '💾 save score';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('save-score-btn').addEventListener('click', async function() {
  const myUid = window.getOrCreateUserId();
  this.disabled = true;
  this.textContent = 'loading...';

  await window.saveScore(score, myUid);

    const myRank = await window.getMyRank(score);
  this.textContent = myRank ? `✅ saved · 🏆 Ranking ${myRank}` : '✅ saved';
});

document.getElementById('ranking-btn').addEventListener('click', async function() {
  const panel = document.getElementById('live-ranking');
  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    this.textContent = '🏆 leaderboard';
    return;
  }
  this.textContent = 'loading...';
  const rankings = await window.getRankings();
  panel.innerHTML = rankings.length === 0
    ? '<div style="text-align:center;color:#555;font-size:0.85rem;padding:8px">No records yet</div>'
    : '<div class="ranking-title">🏆 Top 10</div>' +
      rankings.map((r, i) => `
        <div class="ranking-row">
          <span class="rank-num">${i + 1}</span>
          <span class="rank-name">${r.nickname}</span>
          <span class="rank-score">${r.score.toLocaleString()}</span>
        </div>
      `).join('');
  panel.style.display = 'block';
  this.textContent = '🏆 Close leaderboard';
});

document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); selectedCol = Math.max(0, selectedCol - 1); highlightCol(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); selectedCol = Math.min(COLS - 1, selectedCol + 1); highlightCol(); }
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dropCard(); }
});

document.getElementById('drop-btn').addEventListener('click', dropCard);
document.getElementById('restart-btn').addEventListener('click', init);

function fireConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = `
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 99999; pointer-events: none;
  `;
  document.body.appendChild(canvas);
  const myConfetti = confetti.create(canvas, { resize: true });
  myConfetti({ particleCount: 120, angle: 60,  spread: 70, origin: { x: 0, y: 0.7 } });
  myConfetti({ particleCount: 120, angle: 120, spread: 70, origin: { x: 1, y: 0.7 } });
  setTimeout(() => canvas.remove(), 4000);
}
const uid = window.getOrCreateUserId();
document.getElementById('player-id').textContent = uid;

</script>
